<!DOCTYPE html>
<html>
<head>
<title>Edit Booking</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(135deg, #56ab2f, #a8e063);
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    width: 100%;
    max-width: 430px;
    background: rgba(255,255,255,0.25);
    padding: 35px;
    border-radius: 18px;
    box-shadow: 0 12px 35px rgba(0,0,0,0.25);
}

h1 {
    text-align: center;
    color: white;
    margin-bottom: 25px;
}

label {
    font-weight: bold;
    color: white;
}

input, select {
    width: 100%;
    padding: 12px;
    margin: 8px 0 18px 0;
    border: none;
    border-radius: 8px;
    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 13px;
    background: #2e7d32;
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #1b5e20;
}

.back {
    display: block;
    text-align: center;
    margin-top: 18px;
    color: white;
    font-weight: bold;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="card">
<h1>✏️ Edit Booking</h1>

<form method="POST">
    <label>Date</label>
    <input type="date" name="date" value="{{ booking.date }}" required>

    <label>Start Time</label>
    <input type="time" name="start" value="{{ booking.start }}" required>

    <label>End Time</label>
    <input type="time" name="end" value="{{ booking.end }}" required>

    <label>Court</label>
    <select name="court">
        <option {% if booking.court == "Court 1" %}selected{% endif %}>Court 1</option>
        <option {% if booking.court == "Court 2" %}selected{% endif %}>Court 2</option>
    </select>

    <button type="submit">Save Changes</button>
</form>

<a class="back" href="/home">⬅ Back to Dashboard</a>
</div>

</body>
</html>
