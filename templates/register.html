<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register | Compound Tennis Court Booking</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;

            background:
                linear-gradient(
                    rgba(0, 0, 0, 0.48),
                    rgba(0, 0, 0, 0.68)
                ),
                url("https://images.unsplash.com/photo-1595435934249-5df7ed86e1c0?auto=format&fit=crop&w=1800&q=85");

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .card {
            width: 100%;
            max-width: 520px;
            padding: 46px 42px;

            background: rgba(15, 18, 15, 0.68);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);

            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 24px;

            box-shadow: 0 24px 65px rgba(0, 0, 0, 0.48);

            color: white;
            text-align: center;

            animation: cardEntrance 0.7s ease;
        }

        @keyframes cardEntrance {
            from {
                opacity: 0;
                transform: translateY(25px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-size: 46px;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 34px;
            margin-bottom: 10px;
        }

        .subtitle {
            margin-bottom: 28px;
            color: rgba(255, 255, 255, 0.76);
            font-size: 15px;
            line-height: 1.5;
        }

        .error {
            margin-bottom: 18px;
            padding: 12px 14px;

            border: 1px solid rgba(255, 130, 130, 0.38);
            border-radius: 10px;

            background: rgba(160, 25, 25, 0.35);
            color: #ffe0e0;

            font-size: 14px;
            font-weight: 600;
        }

        .input-group {
            position: relative;
            margin-bottom: 17px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;

            color: rgba(255, 255, 255, 0.88);
            font-size: 14px;
            font-weight: 600;
        }

        input,
        select {
            width: 100%;
            min-height: 52px;
            padding: 14px 16px;

            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            outline: none;

            background: rgba(255, 255, 255, 0.94);
            color: #1e1e1e;

            font-size: 16px;

            transition:
                border-color 0.2s ease,
                box-shadow 0.2s ease,
                transform 0.2s ease;
        }

        input:focus,
        select:focus {
            border-color: #83d653;
            box-shadow: 0 0 0 4px rgba(131, 214, 83, 0.18);
            transform: translateY(-1px);
        }

        .password-input {
            padding-right: 48px;
        }

        .toggle {
            position: absolute;
            right: 14px;
            bottom: 15px;

            border: none;
            background: transparent;
            cursor: pointer;

            font-size: 18px;
            line-height: 1;
        }

        .strength {
            height: 7px;
            margin-top: -7px;
            margin-bottom: 18px;

            overflow: hidden;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.18);
        }

        .bar {
            width: 0%;
            height: 100%;
            border-radius: 999px;

            transition:
                width 0.3s ease,
                background-color 0.3s ease;
        }

        .resident-section {
            padding-top: 4px;
        }

        .register-button {
            width: 100%;
            min-height: 54px;
            margin-top: 5px;
            padding: 14px;

            border: none;
            border-radius: 12px;

            background: linear-gradient(135deg, #58af2d, #8bd94f);
            color: white;

            font-size: 16px;
            font-weight: 700;

            cursor: pointer;

            transition:
                transform 0.2s ease,
                box-shadow 0.2s ease;
        }

        .register-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(101, 194, 53, 0.34);
        }

        .register-button:active {
            transform: translateY(0);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;

            margin: 26px 0 20px;

            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.18);
        }

        .login-text {
            color: rgba(255, 255, 255, 0.76);
            font-size: 14px;
        }

        .login-link {
            display: inline-block;
            margin-left: 4px;

            color: #b9ed9b;
            font-weight: 700;
            text-decoration: none;
        }

        .login-link:hover {
            text-decoration: underline;
        }

        .home-link {
            display: inline-block;
            margin-top: 25px;

            color: rgba(255, 255, 255, 0.65);
            font-size: 13px;
            text-decoration: none;
        }

        .home-link:hover {
            color: white;
        }

        @media (max-width: 600px) {
            body {
                align-items: flex-start;
                padding: 16px;
                background-position: center;
            }

            .card {
                max-width: 100%;
                margin: 18px 0;
                padding: 34px 22px;
                border-radius: 20px;
            }

            .logo {
                font-size: 40px;
            }

            h1 {
                font-size: 29px;
            }

            .subtitle {
                font-size: 14px;
            }

            input,
            select,
            .register-button {
                min-height: 56px;
            }
        }
    </style>
</head>

<body>

    <main class="card">

        <div class="logo">🎾</div>

        <h1>Create Account</h1>

        <p class="subtitle">
            Register for secure access to your compound tennis court booking system.
        </p>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST" onsubmit="return validateForm()">

            <div class="input-group">
                <label for="username">Username</label>

                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Choose a username"
                    autocomplete="username"
                    required
                >
            </div>

            <div class="input-group">
                <label for="password">Password</label>

                <input
                    type="password"
                    id="password"
                    name="password"
                    class="password-input"
                    placeholder="Create a password"
                    autocomplete="new-password"
                    required
                    onkeyup="strengthCheck()"
                >

                <button
                    type="button"
                    class="toggle"
                    id="passwordToggle"
                    onclick="togglePass()"
                    aria-label="Show password"
                >
                    👁️
                </button>
            </div>

            <div class="strength">
                <div class="bar" id="bar"></div>
            </div>

            <div class="input-group">
                <label for="confirm">Confirm password</label>

                <input
                    type="password"
                    id="confirm"
                    placeholder="Re-enter your password"
                    autocomplete="new-password"
                    required
                >
            </div>

            <div class="input-group">
                <label for="role">Account role</label>

                <select
                    name="role"
                    id="role"
                    required
                    onchange="toggleResidentFields()"
                >
                    <option value="">Select role</option>
                    <option value="player">Resident</option>
                    <option value="guard">Guard</option>
                    <option value="landlord">Landlord</option>
                </select>
            </div>

            <div id="residentFields" class="resident-section">

                <div class="input-group">
                    <label for="building">Building</label>

                    <select name="building" id="building">
                        <option value="">Select building</option>
                        <option value="GS1">GS1</option>
                        <option value="GS2">GS2</option>
                        <option value="GS3">GS3</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="flat_number">Flat number</label>

                    <input
                        type="text"
                        name="flat_number"
                        id="flat_number"
                        placeholder="Flat number (optional)"
                    >
                </div>

            </div>

            <div class="input-group">
                <label for="mobile_number">Mobile number</label>

                <input
                    type="tel"
                    id="mobile_number"
                    name="mobile_number"
                    placeholder="Enter your mobile number"
                    autocomplete="tel"
                    required
                >
            </div>

            <button type="submit" class="register-button">
                Create Account
            </button>

        </form>

        <div class="divider">Already registered?</div>

        <p class="login-text">
            Already have an account?
            <a href="/login" class="login-link">
                Sign in
            </a>
        </p>

        <a href="/" class="home-link">
            ← Return to homepage
        </a>

    </main>

    <script>
        function togglePass() {
            const passwordInput = document.getElementById("password");
            const toggleButton = document.getElementById("passwordToggle");

            const passwordIsHidden = passwordInput.type === "password";

            passwordInput.type = passwordIsHidden ? "text" : "password";
            toggleButton.textContent = passwordIsHidden ? "🙈" : "👁️";

            toggleButton.setAttribute(
                "aria-label",
                passwordIsHidden ? "Hide password" : "Show password"
            );
        }

        function strengthCheck() {
            const password = document.getElementById("password").value;
            const bar = document.getElementById("bar");

            let strength = 0;

            if (password.length >= 6) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;

            bar.style.width = `${strength * 25}%`;

            if (strength <= 1) {
                bar.style.background = "#ff5c5c";
            } else if (strength === 2) {
                bar.style.background = "#ff9f43";
            } else if (strength === 3) {
                bar.style.background = "#e7d84b";
            } else {
                bar.style.background = "#78d64b";
            }
        }

        function toggleResidentFields() {
            const role = document.getElementById("role").value;
            const residentFields = document.getElementById("residentFields");
            const building = document.getElementById("building");
            const flatNumber = document.getElementById("flat_number");

            if (role === "player") {
                residentFields.style.display = "block";
                building.required = true;
            } else {
                residentFields.style.display = "none";
                building.required = false;
                building.value = "";
                flatNumber.value = "";
            }
        }

        function validateForm() {
            const password = document.getElementById("password").value;
            const confirmation = document.getElementById("confirm").value;

            if (password !== confirmation) {
                alert("Passwords do not match.");
                return false;
            }

            return true;
        }

        toggleResidentFields();
    </script>

</body>
</html>
