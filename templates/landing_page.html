<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tennis Court Booking</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:"Segoe UI",sans-serif;

    background:
    linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.55)),
    url("https://images.unsplash.com/photo-1599058917212-d750089bc07e?auto=format&fit=crop&w=1800&q=80");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:30px;

}

.hero{

    width:100%;
    max-width:700px;

    background:rgba(18,18,18,.60);

    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.15);

    border-radius:24px;

    padding:60px;

    text-align:center;

    color:white;

    box-shadow:0 20px 60px rgba(0,0,0,.45);

    animation:fade .8s ease;

}

@keyframes fade{

    from{

        opacity:0;
        transform:translateY(25px);

    }

    to{

        opacity:1;
        transform:translateY(0);

    }

}

.hero-icon{

    font-size:55px;
    margin-bottom:15px;

}

h1{

    font-size:54px;
    line-height:1.1;
    margin-bottom:20px;

}

.subtitle{

    font-size:20px;
    opacity:.95;
    line-height:1.7;

}

.description{

    margin-top:18px;

    font-size:16px;

    opacity:.75;

}

.buttons{

    display:flex;

    justify-content:center;

    gap:18px;

    margin-top:40px;

    flex-wrap:wrap;

}

.btn{

    text-decoration:none;

    color:white;

    background:linear-gradient(135deg,#5fb62d,#8edb52);

    padding:15px 38px;

    border-radius:999px;

    font-weight:700;

    transition:.25s;

    min-width:170px;

}

.btn:hover{

    transform:translateY(-3px);

    box-shadow:0 12px 30px rgba(95,182,45,.35);

}

.footer{

    margin-top:35px;

    font-size:14px;

    opacity:.65;

}

@media(max-width:768px){

.hero{

padding:40px 25px;

}

h1{

font-size:38px;

}

.subtitle{

font-size:18px;

}

.description{

font-size:15px;

}

.buttons{

flex-direction:column;

}

.btn{

width:100%;

}

}

</style>

</head>

<body>

<div class="hero">

<div class="hero-icon">🎾</div>

<h1>Golden Sands Tennis Court Booking</h1>

<p class="subtitle">

Reserve your tennis court in seconds with live availability.

</p>

<p class="description">

<ul>Exclusively for compound residents.</ul>
<ul>Secure, simple and fair court reservations.</ul>

</p>

<div class="buttons">

<a href="/login" class="btn">Login</a>

<a href="/register" class="btn">Register</a>

</div>

<div class="footer">

Designed for residents • Secure Booking System

</div>

</div>

</body>
</html>
